name: Deploy to Production

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  deploy:
    needs: detect-changes
    if: github.event.pull_request.merged == true && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true')
    runs-on: self-hosted
    steps:
      - name: Determinar qué desplegar
        id: flags
        run: |
          FLAGS=""
          if [ "${{ needs.detect-changes.outputs.backend }}" == "true" ]; then
            FLAGS="$FLAGS --backend"
          fi
          if [ "${{ needs.detect-changes.outputs.frontend }}" == "true" ]; then
            FLAGS="$FLAGS --frontend"
          fi
          echo "deploy_flags=$FLAGS" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "🚀 Iniciando deploy..."
            /home/admon/sistema-de-tikets/deploy/deploy.sh ${{ steps.flags.outputs.deploy_flags }}
